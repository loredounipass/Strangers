version: "3.9"

services:
  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - backend-redis:/data
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  backend-redis:
    driver: local